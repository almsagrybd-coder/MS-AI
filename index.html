<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALMSAQRY AI - المطور عبدالرحمن هشام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --accent: #00d4ff;
            --logo-gradient: linear-gradient(45deg, #00d4ff, #0099cc, #0077b6);
        }
        [data-theme="dark"] {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            --card-bg: rgba(0, 0, 0, 0.4);
            --text-primary: #e0e6ed;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: var(--bg-primary);
            background-attachment: fixed; /* يمنع اهتزاز الخلفية عند التمرير */
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: auto; /* يسمح بالتمرير الطبيعي والسلس */
            position: relative;
            transition: background 0.5s ease;
            -webkit-overflow-scrolling: touch; /* تمرير سلس جداً للآيفون */
        }

        /* Logo & Badge */
        .logo-section { position: absolute; top: 30px; right: 30px; z-index: 1000; text-align: center; }
        .logo-icon {
            width: 70px; height: 70px; background: var(--logo-gradient); border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-family: 'Orbitron';
            font-weight: 900; font-size: 1.8rem; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        .badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 10px; border-radius: 10px; font-size: 10px;
            margin-top: 5px; display: inline-block; border: 1px solid rgba(255,255,255,0.3);
        }

        /* Particles Optimization */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.15); border-radius: 50%; animation: float 15s infinite linear; }
        @keyframes float { from { transform: translateY(110vh); opacity: 0; } to { transform: translateY(-10vh); opacity: 0.6; } }

        /* Layout */
        .container { 
            display: flex; 
            min-height: calc(100vh - 40px); 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 130px 20px 60px; 
            gap: 20px; 
            position: relative; 
            z-index: 10; 
        }

        /* Glassmorphism Optimization */
        .clock-section, .chat-section { 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            background: var(--card-bg); 
            border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .clock-section { flex: 0 0 320px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; height: 300px; }
        .digital-clock { font-family: 'Orbitron'; font-size: 3.2rem; color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        
        .chat-section { flex: 1; padding: 25px; display: flex; flex-direction: column; height: 600px; max-height: 70vh; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; }
        .message-content { padding: 12px 18px; border-radius: 15px; max-width: 85%; line-height: 1.6; }
        .ai .message-content { background: rgba(255,255,255,0.1); align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
        .user .message-content { background: var(--accent); color: #1a1a2e; align-self: flex-end; font-weight: 600; }

        /* Input area */
        .input-area { display: flex; gap: 10px; margin-top: 15px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 20px; }
        .message-input { flex: 1; background: transparent; border: none; padding: 10px 15px; color: white; outline: none; font-family: 'Cairo'; font-size: 0.95rem; }

        .theme-toggle { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--card-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; border: 1px solid rgba(255,255,255,0.2); }

        .footer-rights { padding: 20px 0; font-size: 13px; opacity: 0.8; text-align: center; width: 100%; color: white; }

        /* Mobile Adjustments */
        @media (max-width: 768px) { 
            .container { flex-direction: column; padding-top: 140px; height: auto; } 
            .clock-section { flex: none; width: 100%; height: auto; padding: 30px 10px; }
            .chat-section { height: 500px; max-height: 60vh; }
            .digital-clock { font-size: 2.5rem; }
            .logo-section { right: 15px; top: 15px; scale: 0.8; }
            .theme-toggle { left: 15px; top: 15px; scale: 0.8; }
            /* تخفيف التأثيرات الرسومية للهواتف */
            .clock-section, .chat-section { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="theme-toggle" id="themeToggle"><i class="fas fa-sun"></i></div>
    <div class="particles" id="particles"></div>

    <div class="logo-section">
        <div class="logo">
            <div class="logo-icon">AI</div>
            <div style="font-family:'Orbitron'; font-weight:bold; margin-top:5px; font-size:1.1rem; color: white;">ALMSAQRY</div>
            <span class="badge">نسخة تجريبية v1.00</span>
        </div>
    </div>

    <div class="container">
        <div class="clock-section">
            <div style="font-weight: 600; font-size: 1rem; margin-bottom: 10px;">⏰ توقيت ليبيا (طرابلس)</div>
            <div class="digital-clock" id="digitalClock">00:00:00</div>
            <div id="dateDisplay" style="opacity: 0.7; margin-top: 5px;">...</div>
        </div>

        <div class="chat-section">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="message-content">
                        <strong>أهلاً بك في نظام ALMSAQRY AI</strong><br>
                        أنا هنا لمساعدتك، النسخة الحالية هي نسخة تجريبية برمجها عبدالرحمن هشام.
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" class="message-input" id="userInput" placeholder="اكتب سؤالك هنا..." autocomplete="off">
                <button style="width:45px; height:45px; border-radius:15px; border:none; background:var(--logo-gradient); color:white; cursor:pointer;" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="footer-rights">
        جميع الحقوق محفوظة &copy; 2026 | المطور: <b>عبدالرحمان هشام المصاقري</b>
    </div>

   <script>
    // 1. إعدادات الساعة (ليبيا)
    function updateClock() {
        const now = new Date();
        const options = { timeZone: 'Africa/Tripoli', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const timeStr = new Intl.DateTimeFormat('en-GB', options).format(now);
        const dateStr = now.toLocaleDateString('ar-LY', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('digitalClock').textContent = timeStr;
        document.getElementById('dateDisplay').textContent = dateStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. إعدادات المفتاح والـ API
    const API_KEY = "AIzaSyCLclCNcYBzyhYBhQ_klIGKD9xCs6sAyAE"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    // 3. نظام إرسال واستقبال الرسائل
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const msgBox = document.getElementById('messages');
        const text = input.value.trim();

        if (!text) return;

        // إضافة رسالة المستخدم
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.innerHTML = `<div class="message-content">${text}</div>`;
        msgBox.appendChild(userDiv);
        
        input.value = ""; 
        msgBox.scrollTo({ top: msgBox.scrollHeight, behavior: 'smooth' });

        // إضافة مؤشر "جاري التفكير..."
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai';
        loadingDiv.id = 'loading';
        loadingDiv.innerHTML = `<div class="message-content">جاري التفكير...</div>`;
        msgBox.appendChild(loadingDiv);
        msgBox.scrollTo({ top: msgBox.scrollHeight, behavior: 'smooth' });

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;

            // إزالة مؤشر التحميل وإضافة رد الـ AI
            msgBox.removeChild(loadingDiv);
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai';
            aiDiv.innerHTML = `<div class="message-content">${aiResponse}</div>`;
            msgBox.appendChild(aiDiv);
            
        } catch (error) {
            msgBox.removeChild(loadingDiv);
            const errorDiv = document.createElement('div');
            errorDiv.className = 'message ai';
            errorDiv.innerHTML = `<div class="message-content" style="color: #ff4d4d;">عذراً، حدث خطأ في الاتصال. تأكد من مفتاح الـ API.</div>`;
            msgBox.appendChild(errorDiv);
        }
        
        msgBox.scrollTo({ top: msgBox.scrollHeight, behavior: 'smooth' });
    }

    document.getElementById('userInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

    // 4. وضع الـ Dark Mode
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.onclick = () => {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        document.body.setAttribute('data-theme', newTheme);
        themeToggle.innerHTML = newTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    };
</script>
</body>
</html>
